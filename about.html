<p>

서울공업고등학교 드론 동아리는 드론과 항공 기술에 관심 있는 학생들이 모여
비행 기술, 항공 촬영, 드론 정비 등을 함께 배우고 연구하는 동아리입니다.

드론 조종 기술뿐만 아니라 항공 안전 규정과 비행 계획,
촬영 기술 등 다양한 분야를 배우며 실제 드론 산업과 관련된 경험을 쌓는 것을 목표로 합니다.

또한 전국 기능경기대회 드론 직종을 목표로
전문적인 비행 훈련과 기술 연습을 진행하고 있습니다.
